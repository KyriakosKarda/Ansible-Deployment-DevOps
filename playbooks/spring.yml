---
- hosts: app-server
  become: yes
  tasks:
      - name: Create app directory
        file:
          path: "{{ env.spring_app_dest }}"
          state: directory
          owner: ubuntu
          group: ubuntu
          mode: '0755'

      - name: Copy docker compose to target vm 
        copy:
          src: ../../docker-compose.yml
          dest: "{{ env.spring_app_dest }}/docker-compose.yml"

      - name: Run docker compose up again
        community.docker.docker_compose_v2:
          project_src: "{{ env.spring_app_dest }}"
        register: output
