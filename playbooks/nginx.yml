---
- name: Install and configure Nginx reverse proxy
  hosts: application-vm
  become: yes
  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes
      register: nginx_install

    - name: Create Nginx configuration from template
      template:
        src: ../templates/nginx.http.j2
        dest: /etc/nginx/sites-available/spring
        backup: yes
      notify: restart nginx

    - name: Enable spring site in Nginx
      file:
        src: /etc/nginx/sites-available/spring
        dest: /etc/nginx/sites-enabled/spring
        state: link
        force: yes
      notify: restart nginx

    - name: Disable default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: restart nginx

    - name: Verify Nginx configuration syntax
      shell: nginx -t
      register: nginx_test
      failed_when: nginx_test.rc != 0
      changed_when: false

    - name: Ensure Nginx is running and enabled
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted
        daemon_reload: yes